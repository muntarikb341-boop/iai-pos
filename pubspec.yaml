name: iai_pos
description: "Business Inventory Management and Point of Sale System"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Material Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  animations: ^2.0.8

  # State Management
  riverpod: ^2.4.10
  riverpod_annotation: ^2.3.7
  flutter_riverpod: ^2.4.10

  # Routing
  go_router: ^14.1.4

  # API & HTTP
  supabase_flutter: ^1.10.25
  http: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # Barcode & QR Code
  barcode_widget: ^2.0.4
  qr_flutter: ^4.0.0
  mobile_scanner: ^4.1.1

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1

  # Charts
  fl_chart: ^0.65.0

  # Date & Time
  intl: ^0.19.0
  timezone: ^0.9.2

  # Image Handling
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Validation
  form_validator: ^1.1.0

  # Utils
  uuid: ^4.0.0
  dio: ^5.3.1
  logger: ^2.1.0
  connectivity_plus: ^5.0.2
  package_info_plus: ^4.1.0

  # Notifications
  awesome_notifications: ^0.9.3

  # Excel
  excel: ^2.0.2

  # PDF Reading (for imports)
  syncfusion_flutter_pdf: ^24.1.41

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  riverpod_generator: ^2.3.13
  build_runner: ^2.4.7
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/
    - assets/icons/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
